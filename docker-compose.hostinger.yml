services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: upps-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    networks:
      - upps_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_ENABLE_SUBSCRIPTION_CHECKS: ${VITE_ENABLE_SUBSCRIPTION_CHECKS:-true}
        VITE_FLW_PUBLIC_KEY: ${VITE_FLW_PUBLIC_KEY}
        VITE_FLW_PAYMENT_OPTIONS: ${VITE_FLW_PAYMENT_OPTIONS:-mobilemoney}
    container_name: upps-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - upps_net

networks:
  upps_net:
    driver: bridge
